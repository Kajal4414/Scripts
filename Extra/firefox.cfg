// Firefox autoconfig: early-startup prefs only.
// Keep this file small and limited to prefs that benefit from being set before profiles and extensions load.

// Needed for userChrome.css / userContent.css.
defaultPref("toolkit.legacyUserProfileCustomizations.stylesheets", true);

// Real privacy / network-behavior reductions.
defaultPref("network.dns.disablePrefetch", true);
defaultPref("network.prefetch-next", false);
defaultPref("network.predictor.enabled", false);
defaultPref("network.http.speculative-parallel-limit", 0);
defaultPref("browser.urlbar.speculativeConnect.enabled", false);
defaultPref("browser.send_pings", false);
defaultPref("beacon.enabled", false);
defaultPref("dom.push.enabled", false);

// Real memory / UI improvements.
defaultPref("browser.tabs.unloadOnLowMemory", true);
defaultPref("browser.tabs.drawInTitlebar", true);
defaultPref("browser.newtabpage.activity-stream.topSitesRows", 2);
